<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisibility Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --accent: #00ffaa;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --text: #e0e0f0;
    --muted: #555577;
    --yes: #00ffaa;
    --no: #ff3366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; width: 100%; max-width: 900px; }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.08em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  /* Input area */
  .input-zone {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .input-label {
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .num-input {
    flex: 1;
    min-width: 180px;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', monospace;
    font-size: 2.5rem;
    padding: 0.3rem 1rem;
    border-radius: 2px;
    outline: none;
    letter-spacing: 0.1em;
    transition: box-shadow 0.2s;
  }

  .num-input:focus {
    box-shadow: 0 0 0 2px var(--accent), 0 0 20px rgba(0,255,170,0.15);
  }

  .num-input::placeholder { color: var(--muted); }

  .test-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.8rem 1.8rem;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
  }

  .test-btn:hover {
    box-shadow: 0 0 20px rgba(0,255,170,0.4);
    transform: translateY(-1px);
  }

  .test-btn:active { transform: translateY(0); }

  .clear-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.8rem 1.2rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .stat {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .stat span {
    font-size: 1.1rem;
    font-family: 'Bebas Neue', monospace;
    letter-spacing: 0.05em;
  }

  .stat .yes-count { color: var(--yes); }
  .stat .no-count  { color: var(--no); }
  .stat .tested    { color: var(--accent3); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 0.8rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  /* Grid of divisors */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.6rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.9rem 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.15s;
    cursor: default;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border);
    transition: background 0.25s;
  }

  .card.yes {
    border-color: rgba(0,255,170,0.3);
    background: rgba(0,255,170,0.04);
    animation: popIn 0.25s ease;
  }

  .card.yes::before { background: var(--yes); }

  .card.no {
    border-color: rgba(255,51,102,0.2);
    background: rgba(255,51,102,0.03);
  }

  .card.no::before { background: var(--no); }

  .card:hover { transform: translateY(-2px); }

  @keyframes popIn {
    0%  { transform: scale(0.95); opacity: 0.5; }
    60% { transform: scale(1.03); }
    100%{ transform: scale(1);    opacity: 1; }
  }

  .card-divisor {
    font-family: 'Bebas Neue', monospace;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--muted);
    transition: color 0.25s;
  }

  .card.yes .card-divisor { color: var(--text); }

  .card-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .card.yes .card-label { color: var(--yes); }
  .card.no  .card-label { color: var(--no); }

  .card-remainder {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .card.yes .card-remainder { color: rgba(0,255,170,0.5); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty .big { font-family: 'Bebas Neue'; font-size: 5rem; opacity: 0.15; }
  .empty p { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.5rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="content">

  <header>
    <div class="title">DIV TESTER</div>
    <div class="subtitle">Divisibility Rules · 1 through 50</div>
  </header>

  <div class="input-zone">
    <span class="input-label">Test №</span>
    <input
      class="num-input"
      id="numInput"
      type="number"
      placeholder="Enter any number…"
      autofocus
    />
    <button class="test-btn" onclick="runTest()">▶ Test</button>
    <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">TESTING: <span class="tested" id="statNum">—</span></div>
    <div class="stat">DIVISIBLE BY: <span class="yes-count" id="statYes">0</span></div>
    <div class="stat">NOT DIVISIBLE: <span class="no-count" id="statNo">0</span></div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('yes',this)">✓ DIVISIBLE ONLY</button>
    <button class="filter-btn" onclick="setFilter('no',this)">✕ NON-DIVISIBLE ONLY</button>
  </div>

  <div id="output">
    <div class="empty">
      <div class="big">50</div>
      <p>Enter a number above and press Test</p>
    </div>
  </div>

</div>

<script>
  let currentFilter = 'all';
  let lastResults = [];

  const input = document.getElementById('numInput');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') runTest();
  });

  function runTest() {
    const raw = input.value.trim();
    if (raw === '' || isNaN(raw)) return;

    const n = BigInt(raw);
    const absN = n < 0n ? -n : n;

    lastResults = [];
    for (let d = 1; d <= 50; d++) {
      const rem = Number(absN % BigInt(d));
      lastResults.push({ d, divisible: rem === 0, rem });
    }

    renderResults(raw, absN);
  }

  function renderResults(raw, absN) {
    const yesCount = lastResults.filter(r => r.divisible).length;
    const noCount  = 50 - yesCount;

    // Stats
    document.getElementById('statNum').textContent = raw;
    document.getElementById('statYes').textContent = yesCount;
    document.getElementById('statNo').textContent  = noCount;
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('filterBar').style.display = 'flex';

    renderGrid();
  }

  function renderGrid() {
    const out = document.getElementById('output');
    const filtered = currentFilter === 'yes'
      ? lastResults.filter(r => r.divisible)
      : currentFilter === 'no'
        ? lastResults.filter(r => !r.divisible)
        : lastResults;

    if (filtered.length === 0) {
      out.innerHTML = `<div class="empty"><div class="big">0</div><p>No results for this filter</p></div>`;
      return;
    }

    const cards = filtered.map(({ d, divisible, rem }) => {
      const cls = divisible ? 'yes' : 'no';
      const label = divisible ? '✓ DIVISIBLE' : '✕ NOT DIV.';
      const remText = divisible ? 'remainder: 0' : `remainder: ${rem}`;
      return `
        <div class="card ${cls}" title="Divisor: ${d} | Remainder: ${rem}">
          <div class="card-divisor">${d}</div>
          <div class="card-label">${label}</div>
          <div class="card-remainder">${remText}</div>
        </div>`;
    }).join('');

    out.innerHTML = `<div class="grid">${cards}</div>`;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (lastResults.length) renderGrid();
  }

  function clearAll() {
    input.value = '';
    lastResults = [];
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('output').innerHTML = `
      <div class="empty">
        <div class="big">50</div>
        <p>Enter a number above and press Test</p>
      </div>`;
    input.focus();
  }
</script>
</body>
</html>
